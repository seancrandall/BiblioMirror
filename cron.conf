# USPTO Bibliographic Data Mirror — weekly update
# Runs every Wednesday at 1 AM local time
# Install: sudo cp cron.conf /etc/cron.d/uspto-biblio-mirror
#
# Make sure ODP_API_KEY is available in the environment.
# Add to ~/.bashrc or create a /data/BiblioData/.env file:
#   export ODP_API_KEY="your-key-here"
#
0 1 * * 3 sean /data/BiblioData/run_weekly.sh >> /data/BiblioData/biblio_mirror.log 2>&1
